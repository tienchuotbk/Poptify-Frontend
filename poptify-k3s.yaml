# Poptify Frontend — k3s Deployment + Service (NodePort), namespace: default
#
# Kiến trúc: NPM là edge (lo domain + TLS). FE expose qua NodePort 30080;
#            NPM forward https://poptify.chuot.io.vn -> http://<VPS-IP>:30080.
#
# Apply:            kubectl apply -f poptify-k3s.yaml
# Cập nhật bản mới: kubectl rollout restart deployment/poptify-frontend
#   (k3s KHÔNG tự redeploy khi :latest đổi; imagePullPolicy: Always để kéo bản mới khi restart)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poptify-frontend
  namespace: default
  labels:
    app: poptify-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poptify-frontend
  template:
    metadata:
      labels:
        app: poptify-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/tienchuotbk/poptify-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7000 # nginx trong container FE listen 7000
          readinessProbe:
            httpGet:
              path: /
              port: 7000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 7000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      # GHCR public nên KHÔNG cần imagePullSecret. Nếu để private:
      #   kubectl create secret docker-registry ghcr-cred \
      #     --docker-server=ghcr.io --docker-username=<user> --docker-password=<PAT read:packages>
      # imagePullSecrets:
      #   - name: ghcr-cred
---
apiVersion: v1
kind: Service
metadata:
  name: poptify-frontend-service
  namespace: default
  labels:
    app: poptify-frontend
spec:
  type: NodePort
  selector:
    app: poptify-frontend
  ports:
    - protocol: TCP
      port: 7000
      targetPort: 7000
      nodePort: 30080 # NPM forward tới <VPS-IP>:30080 (cố định để config NPM ổn định)
