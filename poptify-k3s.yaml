# Poptify Frontend — k3s Deployment + Service + Traefik Ingress (namespace: default)
#
# Apply:            kubectl apply -f poptify-k3s.yaml
# Cập nhật bản mới: kubectl rollout restart deployment/poptify-frontend
#   (k3s KHÔNG tự redeploy khi :latest đổi — phải rollout restart; imagePullPolicy: Always để kéo bản mới)
#
# Domain: poptify.chuot.io.vn
#
# TLS hợp lệ (Shopify bắt buộc HTTPS) qua cert-manager:
#   - Cài cert-manager + tạo ClusterIssuer tên 'letsencrypt-prod' (HTTP-01 qua Traefik).
#   - Nếu CHƯA có cert-manager: bỏ block tls + annotation cert-manager, Traefik sẽ dùng cert tự ký (chỉ để test).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poptify-frontend
  namespace: default
  labels:
    app: poptify-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poptify-frontend
  template:
    metadata:
      labels:
        app: poptify-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/tienchuotbk/poptify-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7000 # nginx trong container FE listen 7000
          readinessProbe:
            httpGet:
              path: /
              port: 7000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 7000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      # GHCR public nên KHÔNG cần imagePullSecret. Nếu để private:
      #   kubectl create secret docker-registry ghcr-cred \
      #     --docker-server=ghcr.io --docker-username=<user> --docker-password=<PAT read:packages>
      # imagePullSecrets:
      #   - name: ghcr-cred
---
apiVersion: v1
kind: Service
metadata:
  name: poptify-frontend-service
  namespace: default
  labels:
    app: poptify-frontend
spec:
  type: ClusterIP
  selector:
    app: poptify-frontend
  ports:
    - protocol: TCP
      port: 7000
      targetPort: 7000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poptify-frontend-ingress
  namespace: default
  annotations:
    # Traefik chỉ nhận trên entrypoint HTTPS (k3s mặc định: web=80, websecure=443).
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # TLS tự động (cần cert-manager + ClusterIssuer 'letsencrypt-prod').
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - poptify.chuot.io.vn
      secretName: poptify-frontend-tls
  rules:
    - host: poptify.chuot.io.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: poptify-frontend-service
                port:
                  number: 7000
