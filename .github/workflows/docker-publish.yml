name: Docker Publish & Deploy

# Build image -> push GHCR -> SSH vào VPS pull & run.
on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SHOPIFY_API_KEY=${{ secrets.VITE_SHOPIFY_API_KEY }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  deploy:
    name: Deploy to VPS
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy k3s manifest to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: poptify-k3s.yaml
          target: ~/poptify-frontend

      - name: Apply manifest & rollout (k3s)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            # k3s kubeconfig (cần user đọc được; xem ghi chú quyền ở dưới).
            export KUBECONFIG="${KUBECONFIG:-/etc/rancher/k3s/k3s.yaml}"

            kubectl apply -f ~/poptify-frontend/poptify-k3s.yaml
            # :latest không tự đổi digest trong manifest → ép pull lại bản mới:
            kubectl rollout restart deployment/poptify-frontend -n default
            kubectl rollout status deployment/poptify-frontend -n default --timeout=120s
