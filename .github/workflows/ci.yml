name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Huỷ run cũ khi push mới cùng branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm run ci = lint && typecheck && test && build (headless, MSW mock — không cần BE/Admin).
      - name: Run CI gate
        run: npm run ci
        env:
          # Build cần VITE_* (placeholder cho CI là đủ — test dùng MSW, build chỉ cần inline được).
          VITE_SHOPIFY_API_KEY: ci-placeholder-key
          VITE_API_BASE_URL: http://localhost:3000
