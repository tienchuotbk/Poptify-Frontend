server {
  listen       7000;
  listen       [::]:7000;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Embedded Shopify app: PHẢI nhúng được trong Admin iframe.
  # KHÔNG set X-Frame-Options (DENY/SAMEORIGIN sẽ vỡ iframe).
  set $shopify_csp "frame-ancestors https://*.myshopify.com https://admin.shopify.com;";

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # SPA fallback — client-side routing (/popups, /settings, …) trả về index.html.
  location / {
    add_header Content-Security-Policy $shopify_csp always;
    try_files $uri $uri/ /index.html;
  }

  # index.html KHÔNG cache (luôn lấy bản mới sau deploy) + giữ CSP cho document được nhúng.
  location = /index.html {
    add_header Content-Security-Policy $shopify_csp always;
    add_header Cache-Control "no-cache" always;
  }

  # Asset có hash trong tên → cache dài.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }
}
