# Chạy FE container và đưa vào chung network 'chuot_net' với Nginx Proxy Manager (NPM).
# NPM forward domain -> http://poptify-frontend:7000 (nội bộ network, không cần publish ra host).
#
# Chuẩn bị 1 lần:
#   docker network create chuot_net    # nếu chưa có
#   (NPM cũng phải nằm trong network 'chuot_net')
#
# Deploy thủ công trên VPS:
#   docker compose pull && docker compose up -d
services:
  frontend:
    image: ghcr.io/tienchuotbk/poptify-frontend:latest
    container_name: poptify-frontend
    restart: unless-stopped
    networks:
      - chuot_net
    # Publish 7000 ra host → NPM forward http://<VPS-IP>:7000 (và vẫn vào được qua chuot_net).
    ports:
      - "7000:7000"

networks:
  chuot_net:
    external: true
